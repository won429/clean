<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>국립경국대 주요 공지</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { background-color: #E5E7EB; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const IconBase = ({ children, size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const MapPin = (p) => <IconBase {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconBase>;
    const ChevronDown = (p) => <IconBase {...p}><path d="m6 9 6 6 6-6"/></IconBase>;
    const ChevronRight = (p) => <IconBase {...p}><path d="m9 18 6-6-6-6"/></IconBase>;
    const Search = (p) => <IconBase {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>;
    const Bell = (p) => <IconBase {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></IconBase>;
    const TrendingUp = (p) => <IconBase {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></IconBase>;
    const Clock = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>;
    const Calendar = (p) => <IconBase {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconBase>;
    const Bookmark = (p) => <IconBase {...p}><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></IconBase>;
    const Home = (p) => <IconBase {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconBase>;
    const MessageCircle = (p) => <IconBase {...p}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></IconBase>;
    const User = (p) => <IconBase {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>;
    const X = (p) => <IconBase {...p}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconBase>;

    function App() {
      const [activeTab, setActiveTab] = useState("전체");
      const [activeNav, setActiveNav] = useState("home");
      const [selectedSchool, setSelectedSchool] = useState("국립경국대학교 안동캠퍼스");
      const [isSchoolMenuOpen, setIsSchoolMenuOpen] = useState(false);
      
      const [feedData, setFeedData] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [errorMsg, setErrorMsg] = useState("");
      
      // ✨ 게시글 본문 팝업을 위한 상태
      const [selectedNotice, setSelectedNotice] = useState(null);

      const SCHOOLS = ["국립경국대학교 안동캠퍼스", "국립경국대학교 상주캠퍼스", "서울캠퍼스", "글로벌캠퍼스"];
      const categories = ["전체", "인기", "학사", "장학", "취업", "일반"];

      useEffect(() => {
        fetch(`notices.json?t=${new Date().getTime()}`)
          .then(response => {
            if (!response.ok) throw new Error(`데이터를 찾을 수 없습니다 (상태: ${response.status}).`);
            return response.json();
          })
          .then(data => {
            setFeedData(data);
            setIsLoading(false);
          })
          .catch(error => {
            console.error("데이터 로딩 실패:", error);
            setErrorMsg(error.message);
            setIsLoading(false);
          });
      }, []);

      const filteredFeed = feedData.filter(item => {
        if (activeTab === "전체") return true;
        if (activeTab === "인기") return item.isHot;
        return item.category === activeTab;
      });

      return (
        <div className="h-[100dvh] flex justify-center font-sans text-[#191F28] selection:bg-blue-100 overflow-hidden">
          <div className="w-full max-w-md bg-[#F2F4F6] h-full relative shadow-2xl flex flex-col overflow-hidden">
            
            {/* 상단 헤더 */}
            <header className="px-5 pt-14 pb-5 flex justify-between items-end bg-[#F2F4F6] z-20 sticky top-0">
              <div>
                <div className="relative z-30">
                  <button onClick={() => setIsSchoolMenuOpen(!isSchoolMenuOpen)} className="flex items-center gap-1.5 text-[#3182F6] mb-1.5 hover:opacity-80 transition-opacity">
                    <MapPin size={14} strokeWidth={2.5} />
                    <span className="text-[13px] font-bold tracking-tight">{selectedSchool}</span>
                    <ChevronDown size={14} strokeWidth={2.5} className={`transition-transform duration-200 ${isSchoolMenuOpen ? 'rotate-180' : ''}`} />
                  </button>

                  {isSchoolMenuOpen && (
                    <>
                      <div className="fixed inset-0 z-40" onClick={() => setIsSchoolMenuOpen(false)} />
                      <div className="absolute top-full left-0 mt-1 w-[240px] bg-white rounded-[16px] shadow-[0_12px_40px_rgb(0,0,0,0.12)] border border-[#E5E7EB] overflow-hidden z-50 py-1">
                        {SCHOOLS.map(school => (
                          <button
                            key={school}
                            onClick={() => { setSelectedSchool(school); setIsSchoolMenuOpen(false); }}
                            className={`w-full text-left px-4 py-3 text-[14px] transition-colors ${
                              selectedSchool === school ? 'bg-[#F2F4F6] text-[#3182F6] font-bold' : 'text-[#4E5968] hover:bg-gray-50 font-medium'
                            }`}
                          >
                            {school}
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                </div>
                <h1 className="text-[26px] font-extrabold tracking-tight leading-none">주요 공지</h1>
              </div>
              <div className="flex gap-2">
                <button className="w-10 h-10 rounded-full flex items-center justify-center text-[#4E5968] hover:bg-black/5 transition-colors">
                  <Search size={22} strokeWidth={2} />
                </button>
                <button className="w-10 h-10 rounded-full flex items-center justify-center text-[#4E5968] hover:bg-black/5 transition-colors relative">
                  <Bell size={22} strokeWidth={2} />
                  <span className="absolute top-2.5 right-2.5 w-1.5 h-1.5 bg-[#F04452] rounded-full"></span>
                </button>
              </div>
            </header>

            <main className="flex-1 overflow-y-auto pb-32 px-5 no-scrollbar">
              
              <section className="mb-8 mt-1">
                <div className="bg-[#191F28] rounded-[24px] p-6 text-white shadow-[0_8px_20px_rgb(0,0,0,0.12)] relative overflow-hidden group cursor-pointer">
                  <div className="flex justify-between items-start mb-4">
                    <span className="inline-block px-2.5 py-1 bg-white/10 backdrop-blur-md rounded-md text-[11px] font-bold tracking-wider uppercase text-white/90">
                      LIVE UPDATE
                    </span>
                    <ChevronRight size={20} className="text-white/50 group-hover:text-white transition-colors" />
                  </div>
                  <h2 className="text-[20px] font-bold leading-[1.35] mb-2">
                    실시간 학교 공지사항<br/>자동 수집 중입니다.
                  </h2>
                  <p className="text-[#8B95A1] text-[13px] font-medium">아래 목록에서 진짜 공지사항을 확인하세요.</p>
                </div>
              </section>

              <div className="flex gap-2 overflow-x-auto no-scrollbar touch-pan-x mb-5 pb-2">
                {categories.map((cat) => (
                  <button
                    key={cat}
                    onClick={() => setActiveTab(cat)}
                    className={`whitespace-nowrap px-4 py-2 rounded-[14px] text-[15px] font-bold transition-all ${
                      activeTab === cat ? "bg-[#191F28] text-white shadow-md" : "bg-white text-[#4E5968] shadow-sm hover:bg-gray-50"
                    }`}
                  >
                    {cat}
                  </button>
                ))}
              </div>

              <div className="space-y-3">
                {errorMsg && (
                  <div className="bg-[#F04452]/10 border border-[#F04452]/20 rounded-[20px] p-6 text-center shadow-sm">
                    <h3 className="text-[#F04452] font-extrabold text-[16px] mb-2">🚨 데이터 연결 실패</h3>
                    <p className="text-[#F04452]/80 text-[13px] font-medium leading-relaxed">
                      {errorMsg}<br/><br/>💡 로봇이 아직 데이터를 수집 중이거나 에러가 발생했습니다.
                    </p>
                  </div>
                )}

                {isLoading && !errorMsg && (
                  <div className="text-center py-10 text-[#8B95A1] font-bold animate-pulse">
                    데이터를 불러오는 중입니다...
                  </div>
                )}

                {!isLoading && feedData.length === 0 && !errorMsg && (
                  <div className="text-center py-10 text-[#8B95A1] font-bold">
                    아직 수집된 공지사항이 없습니다.
                  </div>
                )}

                {!isLoading && filteredFeed.map((item) => (
                  <article 
                    key={item.id} 
                    onClick={() => setSelectedNotice(item)} // ✨ 클릭하면 본문 팝업 띄우기!
                    className="bg-white p-5 rounded-[20px] shadow-sm hover:shadow-md transition-shadow cursor-pointer active:scale-[0.98] duration-200"
                  >
                    <div className="flex justify-between items-center mb-3">
                      <div className="flex items-center gap-2">
                        <span className="text-[12px] font-bold text-[#3182F6]">{item.category}</span>
                        {item.isHot && (
                          <>
                            <span className="w-1 h-1 bg-[#D1D6DB] rounded-full"></span>
                            <span className="flex items-center gap-1 text-[11px] font-extrabold text-[#F04452] tracking-wider bg-[#F04452]/10 px-1.5 py-0.5 rounded">
                              <TrendingUp size={10} strokeWidth={3} /> NEW
                            </span>
                          </>
                        )}
                      </div>
                    </div>
                    
                    <h3 className="text-[16px] font-bold text-[#191F28] leading-[1.45] mb-4 line-clamp-2">{item.title}</h3>
                    
                    <div className="flex items-center justify-between mt-1 pt-4 border-t border-[#F2F4F6]">
                      <div className="flex items-center gap-3 text-[12px] text-[#8B95A1] font-medium">
                        <span className="flex items-center gap-1.5"><Calendar size={14} strokeWidth={2} /> {item.timeAgo}</span>
                      </div>
                      <Bookmark size={18} strokeWidth={2} className="text-[#D1D6DB] hover:text-[#3182F6] transition-colors" />
                    </div>
                  </article>
                ))}
              </div>
            </main>

            {/* ✨ 토스(Toss) 스타일 본문 팝업창(Modal) */}
            {selectedNotice && (
              <div className="absolute inset-0 z-[60] flex flex-col bg-white animate-in slide-in-from-bottom-4 duration-200">
                <header className="px-5 pt-14 pb-4 flex justify-between items-center border-b border-[#F2F4F6]">
                  <div className="flex items-center gap-2">
                    <span className="text-[12px] font-bold text-[#3182F6] bg-blue-50 px-2.5 py-1 rounded-md">{selectedNotice.category}</span>
                    <h2 className="text-[15px] font-bold text-[#191F28]">상세 공지</h2>
                  </div>
                  <button onClick={() => setSelectedNotice(null)} className="w-9 h-9 flex items-center justify-center bg-[#F2F4F6] hover:bg-gray-200 transition-colors rounded-full text-[#4E5968]">
                    <X size={20} strokeWidth={2.5} />
                  </button>
                </header>
                
                <div className="flex-1 overflow-y-auto p-6 no-scrollbar">
                  <h1 className="text-[22px] font-extrabold text-[#191F28] leading-[1.4] mb-4 break-keep">
                    {selectedNotice.title}
                  </h1>
                  <div className="text-[13px] text-[#8B95A1] font-medium mb-6 pb-6 border-b border-[#F2F4F6] flex items-center gap-1.5">
                    <Calendar size={14} strokeWidth={2} /> {selectedNotice.timeAgo}
                  </div>
                  <div className="text-[15px] leading-relaxed text-[#4E5968] whitespace-pre-wrap font-medium break-keep">
                    {selectedNotice.content 
                      ? selectedNotice.content 
                      : "본문 내용을 불러올 수 없거나 텍스트 내용이 없는 게시물입니다.\n(이미지나 첨부파일로만 이루어진 공지일 수 있습니다.)"}
                  </div>
                </div>
                
                <div className="p-5 border-t border-[#F2F4F6] bg-white pb-8">
                  <button 
                    onClick={() => window.open(selectedNotice.link, '_blank')} 
                    className="w-full py-4 flex justify-center items-center gap-2 bg-[#3182F6] text-white rounded-[16px] font-bold text-[16px] hover:bg-blue-600 transition-all shadow-[0_4px_12px_rgba(49,130,246,0.3)] active:scale-[0.98]"
                  >
                    웹사이트에서 원문 및 첨부파일 보기 <ChevronRight size={18} strokeWidth={2.5} />
                  </button>
                </div>
              </div>
            )}

            {/* 하단 네비게이션 바 */}
            <nav className="absolute bottom-6 left-6 right-6 bg-white/85 backdrop-blur-2xl border border-white/50 rounded-[24px] shadow-[0_10px_40px_rgb(0,0,0,0.08)] z-50 px-2 py-2 flex justify-between items-center">
              {[
                { id: 'home', icon: Home, label: '홈' },
                { id: 'community', icon: MessageCircle, label: '게시판' },
                { id: 'bookmark', icon: Bookmark, label: '저장됨' },
                { id: 'profile', icon: User, label: '마이' }
              ].map((nav) => (
                <button 
                  key={nav.id}
                  onClick={() => setActiveNav(nav.id)}
                  className={`flex flex-col items-center justify-center w-[72px] h-[52px] rounded-[18px] transition-all duration-300 ${
                    activeNav === nav.id ? "bg-[#191F28] text-white shadow-md" : "text-[#8B95A1] hover:text-[#191F28] hover:bg-gray-50"
                  }`}
                >
                  <nav.icon size={22} strokeWidth={activeNav === nav.id ? 2.5 : 2} />
                  {activeNav === nav.id && <span className="text-[10px] font-bold mt-1 tracking-tight">{nav.label}</span>}
                </button>
              ))}
            </nav>
            
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
